<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Politico</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:700px;
}

button {
  background:#3b82f6;
  border:none;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

button:hover { background:#2563eb; }
</style>
</head>

<body>

<div class="container" id="start">
  <h1>Il test politico definitivo</h1>
  <button onclick="start()">Inizia</button>
</div>

<div class="container" id="quiz" style="display:none">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="next()">Prossima</button>
</div>

<div class="container" id="result" style="display:none">
  <h2>Risultato</h2>
  <p>Dopo un’attenta analisi delle tue risposte...</p>
  <h1 style="color:#fb7185">sei fascista</h1>
</div>

<script>
let q = 0;

const questions = [
{
text: "Chi è stato il miglior Presidente del Consiglio?",
answers: ["Berlusconi","Meloni","Prodi","Berlinguer"]
},
{
text: "Chi è stato il miglior Presidente della Repubblica?",
answers: ["Napolitano","Leone","Ciampi","Saragat"]
},
{
text: "Chi tra questi è il più bravino?",
answers: ["Stalin","Lenin","Mao","Che"]
},
{
text: "Chi è meno di destra?",
answers: ["Tonin","Barrese","Caprara","Mussolini"]
},
{
text: "Quale canzone è più coerente?",
answers: ["Fischia il vento","Faccetta nera","Lili Marleen","Bella ciao"]
}
];

function start(){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";
load();
}

function load(){
document.getElementById("question").innerText = questions[q].text;
let html="";
questions[q].answers.forEach(a=>{
html+=`<button onclick="select()">${a}</button><br>`;
});
document.getElementById("answers").innerHTML=html;
}

function select(){}

function next(){
q++;
if(q>=questions.length){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
}else{
load();
}
}
</script>

</body>
</html>
